name: semgrep

on:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Cancel a superseded run when a newer commit is pushed to the same ref, so
# rapid pushes don't pile up redundant gate runs (each spawns its own ephemeral
# runner). Keyed per workflow + ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep SAST (CE, free)
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install semgrep
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run semgrep
        shell: bash
        run: |
          # exit 0 = clean
          # exit 1 = findings (non-blocking; report-only by default)
          # exit 2 = error -> fail the job
          # Configs: p/default (general best practices) +
          #          p/security-audit (CWE-aligned vulnerabilities).
          set +e
          semgrep \
            --config "p/default" \
            --config "p/security-audit" \
            --metrics=off \
            --error \
            --json --output semgrep-findings.json \
            .
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "::error::semgrep encountered an error"
            exit 1
          fi
          if [ $rc -eq 1 ]; then
            echo "::notice::semgrep found findings (non-blocking; see semgrep-findings.json)"
          fi
          exit 0

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-findings
          path: semgrep-findings.json
          if-no-files-found: ignore
